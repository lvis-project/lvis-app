<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LVIS Chat</title>
    <!--
      Google Fonts CDN (fonts.googleapis.com) 를 제거함.
      해당 도메인이 차단된 환경에서는 매 stylesheet fetch 가
      30–60초 timeout 을 대기해서 UI 클릭마다 freeze 가 발생했다.
      styles.css 의 font-family 는 `system-ui` first stack 으로, 라틴은 OS
      기본 (SF / Segoe UI / Roboto / Cantarell) 을 잡고 한글은 unicode-range
      fallback (Apple SD Gothic Neo / Noto Sans KR / Malgun Gothic) 으로 처리.
      plugin webview 의 UA default 와 letterform 이 정합 — 이슈 #556.
    -->
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
