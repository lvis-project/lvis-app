<!doctype html>
<!--
  Plugin UI Shell — #237 Option B

  Minimal HTML document loaded by each plugin <webview>. The shell asks
  main for the verified entry URL (resolved server-side from the
  webContents → pluginId mapping registered by the host renderer at
  did-attach) and then dynamic-imports the plugin module.

  No query parameters. No user-controllable URLs reach `import()`.

  window.lvisPlugin is injected by plugin-preload.ts before this script.
  window.lvisApi is unreachable here.
-->
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plugin UI</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      (async () => {
        const root = document.getElementById("root");
        if (!window.lvisPlugin?.getEntryUrl) {
          root.textContent = "[lvis] plugin-ui-shell: lvisPlugin bridge missing.";
          return;
        }
        // Registration is guaranteed before src is set (#447), so
        // getEntryUrl() is a synchronous lookup — no retry needed.
        let entry;
        try {
          entry = await window.lvisPlugin.getEntryUrl();
        } catch (err) {
          root.textContent = "[lvis] entry 조회 실패: " + (err?.message ?? String(err));
          return;
        }
        try {
          const mod = await import(/* @vite-ignore */ entry);
          const mountFn =
            mod.mount ??
            mod.default?.mount ??
            (typeof mod.default === "function" ? mod.default : null);
          if (typeof mountFn !== "function") {
            throw new Error("플러그인 모듈에서 mount 함수를 찾을 수 없습니다.");
          }
          await mountFn({ root, bridge: window.lvisPlugin });
        } catch (err) {
          root.style.color = "red";
          root.style.padding = "8px";
          root.style.fontSize = "12px";
          root.textContent = "[lvis] Plugin UI 로딩 실패: " + (err?.message ?? String(err));
          console.error("[lvis:plugin-shell] mount failed", err);
        }
      })();
    </script>
  </body>
</html>
