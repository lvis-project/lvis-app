<!doctype html>
<!--
  Plugin UI Shell — #237 Option B

  Minimal HTML document loaded by each plugin <webview>. The shell asks
  main for the verified entry URL (resolved server-side from the
  webContents → pluginId mapping registered by the host renderer at
  did-attach) and then dynamic-imports the plugin module.

  No query parameters. No user-controllable URLs reach `import()`.

  window.lvisPlugin is injected by plugin-preload.ts before this script.
  window.lvisApi is unreachable here.
-->
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plugin UI</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      (async () => {
        const root = document.getElementById("root");
        if (!window.lvisPlugin?.getEntryUrl) {
          root.textContent = "[lvis] plugin-ui-shell: lvisPlugin bridge missing.";
          return;
        }
        // Race guard: 호스트 renderer 가 webview did-attach 시점에 main 에
        // pluginId↔webContentsId 매핑을 등록한다. shell 의 getEntryUrl 이 그
        // 등록보다 먼저 도착하면 main 이 registration-timeout 으로 응답한다.
        // 회복 가능한 race 이므로 backoff 로 최대 ~6초까지 재시도. 그 외
        // 에러 (실제 frame violation = unauthorized-frame) 는 즉시 break.
        // Issue #439: 1.5초 budget 은 slow boot / dev hot-reload 환경에서
        // 부족했음.
        const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
        const isRecoverable = (msg) => /registration-timeout/i.test(msg);
        let entry;
        let lastErr;
        for (const delay of [0, 100, 200, 400, 800, 1500, 3000]) {
          if (delay) await sleep(delay);
          try {
            entry = await window.lvisPlugin.getEntryUrl();
            if (entry) break;
          } catch (err) {
            lastErr = err;
            const msg = err?.message ?? String(err);
            if (!isRecoverable(msg)) break;
          }
        }
        if (!entry) {
          root.textContent = lastErr
            ? "[lvis] entry 조회 실패: " + (lastErr?.message ?? String(lastErr))
            : "[lvis] plugin-ui-shell: entry URL을 찾을 수 없습니다.";
          return;
        }
        try {
          const mod = await import(/* @vite-ignore */ entry);
          const mountFn =
            mod.mount ??
            mod.default?.mount ??
            (typeof mod.default === "function" ? mod.default : null);
          if (typeof mountFn !== "function") {
            throw new Error("플러그인 모듈에서 mount 함수를 찾을 수 없습니다.");
          }
          await mountFn({ root, bridge: window.lvisPlugin });
        } catch (err) {
          root.style.color = "red";
          root.style.padding = "8px";
          root.style.fontSize = "12px";
          root.textContent = "[lvis] Plugin UI 로딩 실패: " + (err?.message ?? String(err));
          console.error("[lvis:plugin-shell] mount failed", err);
        }
      })();
    </script>
  </body>
</html>
