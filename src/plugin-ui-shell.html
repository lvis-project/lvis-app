<!doctype html>
<!--
  Plugin UI Shell — #237 Option B

  Minimal HTML document loaded by each plugin <webview>. The shell asks
  main for the verified entry URL (resolved server-side from the
  webContents → pluginId mapping registered by the host renderer at
  did-attach) and then dynamic-imports the plugin module.

  No query parameters. No user-controllable URLs reach `import()`.

  window.lvisPlugin is injected by plugin-preload.ts before this script.
  window.lvisApi is unreachable here.
-->
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <!-- CSP: plugins cannot make external network requests (connect-src 'none').
         script-src allows:
           - 'self' for the host-owned external bootstrap (./plugin-ui-shell.js)
             and (after dynamic import) the plugin module file when it's served
             from the same file:// origin (packed asar);
           - blob: for plugin modules loaded via blob URLs;
           - http(s)://localhost:* for plugin dev servers.
         Note: there is intentionally NO 'unsafe-inline' / nonce / hash.
         The bootstrap MUST live in `plugin-ui-shell.js`; an inline module
         block here would be refused under this policy and leave the surface
         blank with no error text. See `src/plugin-ui-shell.js` for details. -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; script-src 'self' blob: http://localhost:* https://localhost:*; style-src 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'none';" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plugin UI</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; }
      body { font-family: "Noto Sans KR", "Noto Sans CJK KR", "NanumGothic", "Malgun Gothic", Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Bootstrap is intentionally external (host-owned, sibling file) so it
         loads under `script-src 'self'` without 'unsafe-inline'. See the CSP
         comment above and `src/plugin-ui-shell.js` for the full rationale. -->
    <script type="module" src="./plugin-ui-shell.js"></script>
  </body>
</html>
