name: Web CI

# CI for the monorepo landing site under web/ (Next.js static export → Cloudflare
# Pages). Runs only when web/ changes so it stays independent of the app CI.
# This workflow is a secret-free build gate for PRs and pushes. Deployment is
# owned by web-deploy.yml and its protected production environment.
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'

concurrency:
  group: web-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: web

jobs:
  build:
    name: Build (static export)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Install (retry on transient registry flakes)
        run: |
          for attempt in 1 2 3; do
            if bun install --frozen-lockfile; then exit 0; fi
            echo "::warning::bun install attempt $attempt failed; clearing cache + retrying"
            rm -rf ~/.bun/install/cache || true
            sleep 10
          done
          echo "::error::bun install failed after 3 attempts"; exit 1
      # `next build` runs type-checking + lint + the static export, so it is the
      # whole gate — a broken page, type error, or bad import fails here.
      - name: Build
        run: bun run build
      - name: Upload static export
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-out
          path: web/out
          if-no-files-found: error
          retention-days: 3
