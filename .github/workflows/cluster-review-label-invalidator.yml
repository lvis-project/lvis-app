name: Cluster Review Label Invalidator

on:
  pull_request_target:
    types: [synchronize, edited, reopened]

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: cluster-review-label-invalidator-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  invalidate:
    name: Invalidate Retained Cluster Review Label
    if: >-
      github.event.action != 'edited' ||
      contains(toJSON(github.event.changes), '"body":') ||
      contains(toJSON(github.event.changes), '"base":')
    runs-on: ubuntu-latest
    steps:
      # Security boundary: this trusted-base workflow never checks out or runs
      # pull-request content. It mutates only the fixed review label.
      - name: Remove retained label
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          LABEL_COUNT=$(gh api "repos/${REPO}/issues/${PR_NUMBER}" \
            --jq '[.labels[].name | select(. == "cluster-review-passed")] | length')
          if [ "$LABEL_COUNT" -gt 0 ]; then
            gh api --method DELETE \
              "repos/${REPO}/issues/${PR_NUMBER}/labels/cluster-review-passed"
          fi
