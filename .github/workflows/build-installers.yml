name: Build Installers

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build
        required: false
        default: main
      skip_code_sign:
        description: Build unsigned internal installers
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    tags:
      - "v*.*.*"

jobs:
  installers:
    name: ${{ matrix.name }}
    # Explicit least-privilege: electron-builder's GitHub publisher
    # needs `contents: write` to create the release and upload assets.
    # Everything else stays at the default (read).
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS installer
            os: macos-15
            target: mac
          - name: Linux installer
            os: ubuntu-latest
            target: linux
          - name: Windows installer
            os: windows-latest
            target: win
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - uses: oven-sh/setup-bun@v2
      - name: Restore package manager and installer caches
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            .cache/electron
            .cache/electron-builder
          key: ${{ runner.os }}-installers-${{ hashFiles('bun.lock') }}-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-installers-${{ hashFiles('bun.lock') }}-
            ${{ runner.os }}-installers-
      # Cache fetched uv runtime (downloaded by scripts/fetch-uv.mjs during postinstall).
      # Key is pinned to uv-targets.mjs so version bumps invalidate the cache. Saves
      # ~30s per matrix job on cold runners and avoids re-downloading from GitHub releases.
      - name: Restore uv runtime cache
        uses: actions/cache@v5
        with:
          path: resources/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('scripts/uv-targets.mjs', 'scripts/fetch-uv.mjs') }}
          restore-keys: |
            ${{ runner.os }}-uv-
      - name: Install Linux packaging tools
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot rpm xvfb
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build installer
        id: build
        shell: bash
        run: |
          set -euo pipefail
          args=("--${{ matrix.target }}")
          # Skip code signing when:
          #   1. workflow_dispatch with skip_code_sign=true (default)
          #   2. tag-push BUT relevant platform cert secret is empty (graceful degradation —
          #      otherwise electron-builder's codesign.js resolves empty CSC_LINK as cwd and
          #      throws "<workspace> not a file"). Mac uses CSC_LINK; Win uses WIN_CSC_LINK.
          #      Linux doesn't sign so this guard skips noop on linux target.
          # When skipping, emit `skip_sign=true` step output so the smoke gate below can
          # also skip — unsigned mac app can't pass Gatekeeper-driven smoke launch.
          if [ "${{ github.event_name == 'push' && 'false' || inputs.skip_code_sign }}" = "true" ] \
             || { [ "${{ matrix.target }}" = "mac" ] && [ -z "${CSC_LINK:-}" ]; } \
             || { [ "${{ matrix.target }}" = "win" ] && [ -z "${WIN_CSC_LINK:-}" ]; }; then
            args+=("--skip-code-sign")
            echo "skip_sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_sign=false" >> "$GITHUB_OUTPUT"
          fi
          args+=("--skip-native-rebuild")
          # NO `--publish` here. The matrix runs three jobs in parallel and
          # if each told electron-builder to publish directly to the same
          # GitHub Release draft, the GitHub API contention produced partial
          # uploads (some assets land, others don't) — observed in v0.2.1 +
          # v0.2.2 release cycles. Instead each job uploads its build output
          # as a workflow artifact, and a single `publish-release` job (below,
          # `needs: installers`) assembles every platform's artifacts and
          # uploads them atomically.
          node scripts/build-installers.mjs "${args[@]}"
        env:
          # GH_TOKEN is required by electron-builder's GitHub publisher to
          # create/update the release and upload assets.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      - name: Smoke launch packaged app
        # macOS Gatekeeper blocks launch of unsigned .app bundles. When the
        # matrix entry is mac AND signing was skipped (either via
        # workflow_dispatch `skip_code_sign=true` OR via graceful-degradation
        # when `CSC_LINK` is empty on tag-push), the smoke step would always
        # fail at app boot — making the entire job fail and the Upload
        # installers step skip, hiding the perfectly-good unsigned dmg/zip
        # artifacts. Skip smoke for that combination so the artifacts upload
        # and can be inspected / hand-attached to a release. All other
        # combinations (mac+signed, linux/win always) still run smoke.
        # `steps.build.outputs.skip_sign` is set by the Build installer step
        # above and is the SOT for whether code-sign was applied.
        if: matrix.target != 'mac' || steps.build.outputs.skip_sign != 'true'
        shell: bash
        env:
          # Windows runners are disposable, so the installer smoke can verify
          # both /KEEP_APP_DATA preservation and the full uninstall cleanup.
          LVIS_ALLOW_DESTRUCTIVE_UNINSTALL_SMOKE: ${{ matrix.target == 'win' && '1' || '' }}
        run: |
          set -euo pipefail
          if [ "${{ matrix.target }}" = "linux" ]; then
            xvfb-run -a node scripts/smoke-packaged-app.mjs --target "${{ matrix.target }}"
          else
            node scripts/smoke-packaged-app.mjs --target "${{ matrix.target }}"
          fi
      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: lvis-${{ matrix.target }}-installers
          # Include `.blockmap` (electron-updater differential update sidecar)
          # so the `publish-release` job can attach it to the GitHub Release
          # alongside the installer itself. Without the blockmap, auto-update
          # falls back to full downloads. Internal subdirs like `mac-arm64/`
          # or `win-unpacked/` (electron-builder's intermediate output) are
          # not uploaded — only the top-level installer artifacts.
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*.zip
            release/*.zip.blockmap
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.exe
            release/*.exe.blockmap
            release/latest*.yml
          if-no-files-found: error
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────
  # publish-release — atomic single-job publisher.
  #
  # The matrix `installers` jobs above used to call `electron-builder
  # --publish always` directly, which produced partial Release pages
  # whenever 3 simultaneous uploads hit the GitHub API contention window
  # (v0.2.1 + v0.2.2 release cycles both lost ~5 assets each). This job
  # consolidates the upload step into a single runner: download every
  # platform artifact, then attach them all to the tag's GitHub Release
  # in one go via `softprops/action-gh-release`. No race possible.
  #
  # Triggered only on tag push (the same condition the old inline
  # publisher used). `workflow_dispatch` builds still produce workflow
  # artifacts but skip the Release upload, matching prior behavior.
  publish-release:
    name: Publish GitHub Release assets (atomic)
    needs: installers
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all platform installers
        uses: actions/download-artifact@v8
        with:
          path: release-staging
          pattern: lvis-*-installers
          merge-multiple: true
      - name: List downloaded assets
        run: ls -la release-staging/
      - name: Create stable latest download aliases
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected a vX.Y.Z tag, got: $GITHUB_REF_NAME" >&2
            exit 1
          fi

          alias_asset() {
            local source="$1"
            local target="$2"

            if [ ! -f "release-staging/$source" ]; then
              echo "Missing release asset for latest alias: $source" >&2
              exit 1
            fi

            ln "release-staging/$source" "release-staging/$target"
          }

          alias_asset "LVIS-${version}-linux-amd64.deb" "LVIS-latest-linux-amd64.deb"
          alias_asset "LVIS-${version}-linux-x86_64.AppImage" "LVIS-latest-linux-x86_64.AppImage"
          alias_asset "LVIS-${version}-linux-x86_64.rpm" "LVIS-latest-linux-x86_64.rpm"
          alias_asset "LVIS-${version}-mac-arm64.dmg" "LVIS-latest-mac-arm64.dmg"
          alias_asset "LVIS-${version}-mac-arm64.dmg.blockmap" "LVIS-latest-mac-arm64.dmg.blockmap"
          alias_asset "LVIS-${version}-mac-arm64.zip" "LVIS-latest-mac-arm64.zip"
          alias_asset "LVIS-${version}-mac-arm64.zip.blockmap" "LVIS-latest-mac-arm64.zip.blockmap"
          alias_asset "LVIS-${version}-win-x64.zip" "LVIS-latest-win-x64.zip"
          alias_asset "LVIS-${version}-windows-x64-setup.exe" "LVIS-latest-windows-x64-setup.exe"
          alias_asset "LVIS-${version}-windows-x64-setup.exe.blockmap" "LVIS-latest-windows-x64-setup.exe.blockmap"

          ls -la release-staging/LVIS-latest-*
      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # `tag_name` defaults to the pushed tag (github.ref_name) since
          # this job runs only on tag push events.
          files: release-staging/*
          # Keep the release draft until a human (or the release script)
          # publishes it — matches the prior electron-builder default.
          draft: true
          # Append to whatever body the release was created with (the
          # initial Release draft is auto-created by GitHub on tag push;
          # we do not overwrite its body here).
          append_body: false
          generate_release_notes: false
          fail_on_unmatched_files: true
