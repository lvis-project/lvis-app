name: Build Installers

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build
        required: false
        default: main
      skip_code_sign:
        description: Build unsigned internal installers
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    tags:
      - "v*.*.*"

jobs:
  installers:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS installer
            os: macos-15
            target: mac
          - name: Linux installer
            os: ubuntu-latest
            target: linux
          - name: Windows installer
            os: windows-latest
            target: win
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - uses: oven-sh/setup-bun@v2
      - name: Restore package manager and installer caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            .cache/electron
            .cache/electron-builder
          key: ${{ runner.os }}-installers-${{ hashFiles('bun.lock') }}-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-installers-${{ hashFiles('bun.lock') }}-
            ${{ runner.os }}-installers-
      - name: Install Linux packaging tools
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot rpm xvfb
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build installer
        shell: bash
        run: |
          set -euo pipefail
          args=("--${{ matrix.target }}")
          if [ "${{ github.event_name == 'push' && 'false' || inputs.skip_code_sign }}" = "true" ]; then
            args+=("--skip-code-sign")
          fi
          args+=("--skip-native-rebuild")
          # On tag push (release), tell electron-builder to publish artifacts
          # AND the auto-update manifests (latest-mac.yml / latest.yml /
          # latest-linux.yml) to the GitHub Release for the tag. Without
          # this the artifacts only land in the workflow run as artifacts,
          # so electron-updater cannot resolve a feed.
          if [ "${{ github.event_name }}" = "push" ]; then
            args+=("--publish" "always")
          fi
          node scripts/build-installers.mjs "${args[@]}"
        env:
          # GH_TOKEN is required by electron-builder's GitHub publisher to
          # create/update the release and upload assets.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      - name: Smoke launch packaged app
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.target }}" = "linux" ]; then
            xvfb-run -a node scripts/smoke-packaged-app.mjs --target "${{ matrix.target }}"
          else
            node scripts/smoke-packaged-app.mjs --target "${{ matrix.target }}"
          fi
      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: lvis-${{ matrix.target }}-installers
          path: |
            release/*
            !release/**/*.blockmap
          if-no-files-found: error
          retention-days: 14
