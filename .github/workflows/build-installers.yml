name: Build Installers

on:
  workflow_dispatch:
    inputs:
      skip_code_sign:
        description: Build unsigned internal installers
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    tags:
      - "v*.*.*"

jobs:
  # Public tag semantics are verified from the immutable event SHA. The profile
  # never controls secret injection; public tag secrets are fixed in workflow.
  release-profile:
    name: Verify immutable unsigned release profile
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Verify exact source head
        shell: bash
        env:
          EXPECTED_SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ ! "$EXPECTED_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Expected source SHA must be 40 lowercase hexadecimal characters" >&2
            exit 1
          fi
          actual_head="$(git rev-parse HEAD)"
          if [ "$actual_head" != "$EXPECTED_SOURCE_SHA" ]; then
            echo "Checkout HEAD does not equal immutable event source SHA" >&2
            exit 1
          fi
      - name: Require an immutable protected public tag
        if: github.event_name == 'push'
        shell: bash
        env:
          REF_PROTECTED: ${{ github.ref_protected }}
        run: |
          set -euo pipefail
          if [ "$REF_PROTECTED" != "true" ]; then
            echo "Public tag releases require an active immutable v* tag ruleset" >&2
            exit 1
          fi
      - name: Verify immutable unsigned release profile
        shell: bash
        run: |
          set -euo pipefail
          node scripts/release-profile.mjs \
            --event-name "${{ github.event_name }}" \
            --ref-name "${{ github.ref_name }}" \
            --source-sha "${{ github.sha }}"

  installers:
    name: ${{ matrix.name }}
    needs: release-profile
    # Matrix builds only produce workflow artifacts. The atomic publisher owns
    # the sole contents:write permission in its separate job.
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS installer
            os: macos-15
            target: mac
          - name: Linux installer
            os: ubuntu-latest
            target: linux
          - name: Windows installer
            os: windows-latest
            target: win
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Verify exact source head
        shell: bash
        env:
          EXPECTED_SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          actual_head="$(git rev-parse HEAD)"
          if [ "$actual_head" != "$EXPECTED_SOURCE_SHA" ]; then
            echo "Checkout HEAD does not equal immutable event source SHA" >&2
            exit 1
          fi
      - uses: oven-sh/setup-bun@v2
      - name: Restore package manager and installer caches
        uses: actions/cache@v6
        with:
          path: |
            ~/.bun/install/cache
            .cache/electron
            .cache/electron-builder
          key: ${{ runner.os }}-installers-${{ hashFiles('bun.lock') }}-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-installers-${{ hashFiles('bun.lock') }}-
            ${{ runner.os }}-installers-
      # Cache fetched uv runtime (downloaded by scripts/fetch-uv.mjs during postinstall).
      # Key is pinned to uv-targets.mjs so version bumps invalidate the cache. Saves
      # ~30s per matrix job on cold runners and avoids re-downloading from GitHub releases.
      - name: Restore uv runtime cache
        uses: actions/cache@v6
        with:
          path: resources/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('scripts/uv-targets.mjs', 'scripts/fetch-uv.mjs') }}
          restore-keys: |
            ${{ runner.os }}-uv-
      # electron-builder >= 26.14 extracts its icon-conversion helper
      # (icons@x.y.z/icon-tool.js — CommonJS, uses `require`) under
      # ELECTRON_BUILDER_CACHE, which this workflow places INSIDE the
      # workspace (.cache/). Node resolves that file's module scope by
      # walking up to the nearest package.json — the repo root, whose
      # "type": "module" makes the CJS tool execute as ESM and die with
      # "ReferenceError: require is not defined in ES module scope"
      # (v0.3.0 mac/win installer failure; linux passed because AppImage
      # consumes the png directly). Scoping the ELECTRON_BUILDER_CACHE
      # directory itself as CommonJS stops the walk at that boundary for
      # every tool electron-builder extracts there, without touching the
      # sibling ELECTRON_CACHE (.cache/electron) or anything else under
      # .cache/. Local builds are unaffected — the default cache lives in
      # the OS cache dir, outside any workspace package.json scope.
      - name: Scope electron-builder cache dir as CommonJS
        shell: bash
        run: |
          mkdir -p "$ELECTRON_BUILDER_CACHE"
          printf '{ "type": "commonjs" }\n' > "$ELECTRON_BUILDER_CACHE/package.json"
      - name: Install Linux packaging tools
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot rpm xvfb
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build installer
        id: build
        shell: bash
        run: |
          set -euo pipefail
          args=("--${{ matrix.target }}")
          if [ "${{ github.event_name }}" = "push" ]; then
            # Public tags are currently unsigned by deliberate policy. This is
            # event-fixed, not inferred from secrets or tagged source output.
            args+=("--skip-code-sign")
            echo "skip_sign=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.skip_code_sign }}" = "true" ] \
            || { [ "${{ matrix.target }}" = "mac" ] && [ -z "${CSC_LINK:-}" ]; } \
            || { [ "${{ matrix.target }}" = "win" ] && [ -z "${WIN_CSC_LINK:-}" ]; }; then
            # Manual candidates are secret-free; default to unsigned unless a
            # future protected workflow deliberately adds signing evidence.
            args+=("--skip-code-sign")
            echo "skip_sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_sign=false" >> "$GITHUB_OUTPUT"
          fi
          args+=("--skip-native-rebuild")
          # NO `--publish` here. The matrix runs three jobs in parallel and
          # if each told electron-builder to publish directly to the same
          # GitHub Release draft, the GitHub API contention produced partial
          # uploads (some assets land, others don't) — observed in v0.2.1 +
          # v0.2.2 release cycles. Instead each job uploads its build output
          # as a workflow artifact, and a single `publish-release` job (below,
          # `needs: installers`) assembles every platform's artifacts and
          # uploads them atomically.
          node scripts/build-installers.mjs "${args[@]}"
        env:
          # Public tag behavior is fixed by the GitHub event, never a value
          # emitted by tagged source. Both public tags and manual candidates
          # receive no embedded activation or signing secrets in this workflow.
          LVIS_DISTRIBUTION_CHANNEL: ${{ github.event_name == 'push' && 'public' || 'internal' }}
          LVIS_EMBED_DEMO_ACTIVATION: ""
      - name: Smoke launch packaged app
        # macOS Gatekeeper blocks launch of unsigned .app bundles. Public tags
        # and secret-free manual candidates therefore skip only this macOS
        # launch gate so their artifacts can upload; Linux/Windows still run
        # smoke. `steps.build.outputs.skip_sign` is the signing SOT.
        if: matrix.target != 'mac' || steps.build.outputs.skip_sign != 'true'
        shell: bash
        env:
          # Explicitly authorize machine-wide mutation only on the disposable
          # Windows runner, then verify both preservation and full cleanup.
          LVIS_ALLOW_DISPOSABLE_WINDOWS_INSTALLER_SMOKE: ${{ matrix.target == 'win' && '1' || '' }}
          # Windows runners are disposable, so the installer smoke can verify
          # both /KEEP_APP_DATA preservation and the full uninstall cleanup.
          LVIS_ALLOW_DESTRUCTIVE_UNINSTALL_SMOKE: ${{ matrix.target == 'win' && '1' || '' }}
        run: |
          set -euo pipefail
          if [ "${{ matrix.target }}" = "linux" ]; then
            xvfb-run -a node scripts/smoke-packaged-app.mjs --target "${{ matrix.target }}"
          else
            node scripts/smoke-packaged-app.mjs --target "${{ matrix.target }}"
          fi
      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: lvis-${{ matrix.target }}-installers
          # Include `.blockmap` (electron-updater differential update sidecar)
          # so the `publish-release` job can attach it to the GitHub Release
          # alongside the installer itself. Without the blockmap, auto-update
          # falls back to full downloads. Internal subdirs like `mac-arm64/`
          # or `win-unpacked/` (electron-builder's intermediate output) are
          # not uploaded — only the top-level installer artifacts.
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*.zip
            release/*.zip.blockmap
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.exe
            release/*.exe.blockmap
            release/latest*.yml
          if-no-files-found: error
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────
  # publish-release — atomic single-job publisher.
  #
  # The matrix `installers` jobs above used to call `electron-builder
  # --publish always` directly, which produced partial Release pages
  # whenever 3 simultaneous uploads hit the GitHub API contention window
  # (v0.2.1 + v0.2.2 release cycles both lost ~5 assets each). This job
  # consolidates the upload step into a single runner: download every
  # platform artifact, then attach them all to the tag's GitHub Release
  # in one go via `softprops/action-gh-release`. No race possible.
  #
  # Triggered only on tag push (the same condition the old inline
  # publisher used). `workflow_dispatch` builds still produce workflow
  # artifacts but skip the Release upload, matching prior behavior.
  publish-release:
    name: Publish GitHub Release assets (atomic)
    needs: [release-profile, installers]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Verify exact source head
        shell: bash
        env:
          EXPECTED_SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          actual_head="$(git rev-parse HEAD)"
          if [ "$actual_head" != "$EXPECTED_SOURCE_SHA" ]; then
            echo "Checkout HEAD does not equal immutable event source SHA" >&2
            exit 1
          fi
      - name: Verify protected annotated tag still resolves to event SHA
        shell: bash
        env:
          EXPECTED_SOURCE_SHA: ${{ github.sha }}
          EXPECTED_TAG: ${{ github.ref_name }}
          REF_PROTECTED: ${{ github.ref_protected }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "$REF_PROTECTED" != "true" ]; then
            echo "Public tag releases require an active immutable v* tag ruleset" >&2
            exit 1
          fi

          tag_ref="$(curl --fail --silent --show-error --retry 3 \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/ref/tags/${EXPECTED_TAG}")"
          tag_object_type="$(jq --raw-output '.object.type // empty' <<<"$tag_ref")"
          tag_object_sha="$(jq --raw-output '.object.sha // empty' <<<"$tag_ref")"
          if [ "$tag_object_type" != "tag" ] || [[ ! "$tag_object_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Public release tag must remain an annotated tag" >&2
            exit 1
          fi

          tag_object="$(curl --fail --silent --show-error --retry 3 \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}")"
          target_type="$(jq --raw-output '.object.type // empty' <<<"$tag_object")"
          target_sha="$(jq --raw-output '.object.sha // empty' <<<"$tag_object")"
          if [ "$target_type" != "commit" ] || [ "$target_sha" != "$EXPECTED_SOURCE_SHA" ]; then
            echo "Annotated tag does not resolve to the immutable event source SHA" >&2
            exit 1
          fi
      - name: Download all platform installers
        uses: actions/download-artifact@v8
        with:
          path: release-staging
          pattern: lvis-*-installers
          merge-multiple: true
      - name: List downloaded assets
        run: ls -la release-staging/
      - name: Create stable latest download aliases
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected a vX.Y.Z tag, got: $GITHUB_REF_NAME" >&2
            exit 1
          fi

          alias_asset() {
            local source="$1"
            local target="$2"

            if [ ! -f "release-staging/$source" ]; then
              echo "Missing release asset for latest alias: $source" >&2
              exit 1
            fi

            ln "release-staging/$source" "release-staging/$target"
          }

          alias_asset "LVIS-${version}-linux-amd64.deb" "LVIS-latest-linux-amd64.deb"
          alias_asset "LVIS-${version}-linux-x86_64.AppImage" "LVIS-latest-linux-x86_64.AppImage"
          alias_asset "LVIS-${version}-linux-x86_64.rpm" "LVIS-latest-linux-x86_64.rpm"
          alias_asset "LVIS-${version}-mac-arm64.dmg" "LVIS-latest-mac-arm64.dmg"
          alias_asset "LVIS-${version}-mac-arm64.dmg.blockmap" "LVIS-latest-mac-arm64.dmg.blockmap"
          alias_asset "LVIS-${version}-mac-arm64.zip" "LVIS-latest-mac-arm64.zip"
          alias_asset "LVIS-${version}-mac-arm64.zip.blockmap" "LVIS-latest-mac-arm64.zip.blockmap"
          alias_asset "LVIS-${version}-win-x64.zip" "LVIS-latest-win-x64.zip"
          alias_asset "LVIS-${version}-windows-x64-setup.exe" "LVIS-latest-windows-x64-setup.exe"
          alias_asset "LVIS-${version}-windows-x64-setup.exe.blockmap" "LVIS-latest-windows-x64-setup.exe.blockmap"

          ls -la release-staging/LVIS-latest-*
      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # `tag_name` defaults to the pushed tag (github.ref_name) since
          # this job runs only on tag push events.
          files: release-staging/*
          # Keep the release draft until a human (or the release script)
          # publishes it — matches the prior electron-builder default.
          draft: true
          # Current public tag policy is only unsigned, so the disclosure is a
          # reviewed static template rather than tagged source output.
          body_path: .github/release-bodies/public-unsigned.md
          target_commitish: ${{ github.sha }}
          # Replace the initial GitHub draft body with the profile template.
          # Curated notes added before publishing must retain its disclosure.
          append_body: false
          generate_release_notes: false
          fail_on_unmatched_files: true
