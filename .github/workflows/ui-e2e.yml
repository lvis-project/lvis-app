name: UI E2E (Playwright + Electron)

# Opt-in only. Run manually via workflow_dispatch or when PR branches
# explicitly include a `ui-e2e` label. Keeps normal CI fast.
on:
  workflow_dispatch: {}
  pull_request:
    types: [labeled]

jobs:
  ui-e2e:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'ui-e2e')
    runs-on: [self-hosted, Linux, ARM64, oracle]
    timeout-minutes: 25
    env:
      E2E: "1"
      LVIS_E2E: "1"
    steps:
      - name: Checkout lvis-app
        uses: actions/checkout@v6
        with:
          path: lvis-app

      # Sibling plugin repos are required because lvis-app declares
      # file:../lvis-plugin-* dependencies in package.json. Self-hosted runner
      # uses host gh CLI auth (repo scope) instead of a GitHub App token.
      - name: Clone sibling plugin repos
        run: |
          set -euo pipefail
          GH_TOKEN=$(gh auth token)
          for slug in lvis-plugin-pageindex lvis-plugin-meeting lvis-plugin-lge-api lvis-plugin-work-proactive lvis-plugin-agent-hub lvis-plugin-ms-graph; do
            if [ -d "$slug" ]; then rm -rf "$slug"; fi
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/lvis-project/${slug}.git" "$slug"
          done

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - uses: oven-sh/setup-bun@v2

      - name: Install xvfb + Electron runtime deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 libnss3 libasound2t64 libxss1 libxshmfence1 \
            libgbm1 libdrm2 libxcomposite1 libxrandr2 libatk1.0-0 \
            libatk-bridge2.0-0 libcups2 libpangocairo-1.0-0 \
            libpango-1.0-0 libcairo2

      - name: Install lvis-app deps
        working-directory: lvis-app
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers (none needed for electron, skip deps)
        working-directory: lvis-app
        run: bunx playwright install --with-deps=false || true

      - name: Build app + plugins
        working-directory: lvis-app
        run: |
          bun run prepare:plugins
          bun run build

      - name: Run Playwright UI E2E (Linux)
        working-directory: lvis-app
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" bunx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: lvis-app/playwright-report
          if-no-files-found: ignore
