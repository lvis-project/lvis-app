name: UI E2E (Playwright + Electron)

# Opt-in only. Run manually via workflow_dispatch or when PR branches
# explicitly include a `ui-e2e` label. Keeps normal CI fast.
on:
  workflow_dispatch: {}
  pull_request:
    types: [labeled]

jobs:
  ui-e2e:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'ui-e2e')
    runs-on: [self-hosted, Linux, ARM64, oracle]
    timeout-minutes: 25
    env:
      E2E: "1"
      LVIS_E2E: "1"
    steps:
      - name: Checkout lvis-app
        uses: actions/checkout@v6
        with:
          path: lvis-app

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install xvfb + Electron runtime deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 libnss3 libasound2t64 libxss1 libxshmfence1 \
            libgbm1 libdrm2 libxcomposite1 libxrandr2 libatk1.0-0 \
            libatk-bridge2.0-0 libcups2 libpangocairo-1.0-0 \
            libpango-1.0-0 libcairo2

      # OS deps first, language toolchain second — keeps a corp-proxy
      # apt outage from wasting the bun install before it fails the job.
      - uses: oven-sh/setup-bun@v2

      - name: Install lvis-app deps
        working-directory: lvis-app
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers (none needed for electron, skip deps)
        working-directory: lvis-app
        # Hard-fail on download errors: a silent install miss surfaces
        # downstream as a confusing "browser executable not found" during
        # `playwright test`, hiding the actual cause (registry hiccup,
        # corp proxy block).
        run: bunx playwright install --with-deps=false

      - name: Build app
        working-directory: lvis-app
        run: bun run build

      - name: Run Playwright UI E2E (Linux)
        working-directory: lvis-app
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" bunx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: lvis-app/playwright-report
          if-no-files-found: ignore
