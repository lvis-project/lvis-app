name: Agent Hub E2E

on:
  pull_request:
    paths:
      - 'test/e2e/agent-hub/**'
  push:
    branches:
      - main
    paths:
      - 'test/e2e/agent-hub/**'
  schedule:
    # Nightly at 02:00 UTC (11:00 KST)
    - cron: '0 2 * * *'
  workflow_dispatch: {}

jobs:
  agent-hub-e2e:
    name: Agent Hub E2E (Playwright + Electron)
    # E2E requires building private sibling plugin fixtures
    # (lvis-plugin-agent-hub etc.). Fork PRs cannot access
    # LVIS_REPO_READ_TOKEN, so this job is meaningful only for same-repo
    # PRs, push to main, scheduled runs, and workflow_dispatch.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    env:
      E2E: "1"
      LVIS_E2E: "1"
      LVIS_DEV: "1"
      NODE_ENV: test
      ELECTRON_DISABLE_SECURITY_WARNINGS: "1"

    steps:
      - name: Checkout lvis-app
        uses: actions/checkout@v6
        with:
          path: lvis-app

      - name: Clone sibling plugin repos
        env:
          LVIS_REPO_READ_TOKEN: ${{ secrets.LVIS_REPO_READ_TOKEN }}
        run: |
          set -euo pipefail
          repo_token="${LVIS_REPO_READ_TOKEN:-}"
          if [ -z "$repo_token" ] && gh auth status --hostname github.com >/dev/null 2>&1; then
            repo_token="$(gh auth token)"
          fi
          if [ -n "$repo_token" ]; then
            echo "::add-mask::$repo_token"
          else
            echo "::warning::No LVIS_REPO_READ_TOKEN or gh auth token available; attempting unauthenticated sibling clones."
          fi
          sibling_ref="${LVIS_SIBLING_REPO_REF:-${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}}"
          for slug in lvis-plugin-local-indexer lvis-plugin-meeting lvis-plugin-work-assistant lvis-plugin-agent-hub; do
            if [ -d "$slug" ]; then rm -rf "$slug"; fi
            clone_url="https://github.com/lvis-project/${slug}.git"
            if [ -n "$repo_token" ]; then
              clone_url="https://x-access-token:${repo_token}@github.com/lvis-project/${slug}.git"
            fi
            if [ -n "$sibling_ref" ] && git ls-remote --exit-code --heads "$clone_url" "$sibling_ref" >/dev/null 2>&1; then
              echo "Cloning ${slug}@${sibling_ref}"
              git clone --depth 1 --branch "$sibling_ref" "$clone_url" "$slug"
            else
              echo "Cloning ${slug}@default"
              git clone --depth 1 "$clone_url" "$slug"
            fi
          done

      - name: Install xvfb + Electron runtime deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 libnss3 libasound2t64 libxss1 libxshmfence1 \
            libgbm1 libdrm2 libxcomposite1 libxrandr2 libatk1.0-0 \
            libatk-bridge2.0-0 libcups2 libpangocairo-1.0-0 \
            libpango-1.0-0 libcairo2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: lvis-app
        run: bun install --frozen-lockfile

      - name: Build Agent Hub plugin fixture
        working-directory: lvis-plugin-agent-hub
        run: |
          rm -f ../postcss.config.cjs ../postcss.config.js
          if [ ! -f postcss.config.cjs ] && [ ! -f postcss.config.js ]; then
            printf 'module.exports = {};\n' > postcss.config.cjs
          fi
          bun install --frozen-lockfile
          bun run build

      - name: Install Playwright Chromium
        working-directory: lvis-app
        run: bunx playwright install chromium

      - name: Build app
        working-directory: lvis-app
        run: bun run build

      - name: Run Agent Hub E2E tests
        working-directory: lvis-app
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" bunx playwright test test/e2e/agent-hub/
        env:
          CI: "true"

      - name: Upload Playwright report and traces
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agent-hub-playwright-report-${{ github.run_id }}
          path: |
            lvis-app/playwright-report/
            lvis-app/test-results/
          retention-days: 7
          if-no-files-found: ignore
