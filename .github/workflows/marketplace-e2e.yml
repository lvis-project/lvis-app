name: Marketplace E2E (publish ↔ install)

# Opt-in for PRs, scheduled on main. Run manually via workflow_dispatch, when a
# PR branch includes a `marketplace-e2e` label, or nightly against main. The
# nightly schedule prevents this (publish↔install) suite from silently rotting
# the way the UI e2e suite did (#1212) — it is opt-in, so without a schedule it
# would never actually run on main. Keeps per-PR CI fast (still label-gated).
on:
  workflow_dispatch:
    inputs:
      marketplace_ref:
        description: Exact 40-character lvis-marketplace commit SHA
        required: true
        type: string
      sdk_ref:
        description: Exact 40-character lvis-plugin-sdk commit SHA consumed by ep-api
        required: true
        type: string
      ep_api_ref:
        description: Exact 40-character lvis-plugin-lge-api commit SHA
        required: true
        type: string
  pull_request:
    types: [labeled]
  schedule:
    # 02:30 KST (17:30 UTC) daily — offset from e2e.yml's 17:00 to avoid ARM
    # runner contention. Secrets are available on schedule events.
    - cron: '30 17 * * *'

jobs:
  marketplace-e2e:
    name: Marketplace E2E (live lifecycle + containment)
    # workflow_dispatch (manual), nightly schedule, OR same-repo PR labeled
    # `marketplace-e2e`. Sibling marketplace + signing-key secrets are not
    # exposed to forks.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' &&
       github.event.label.name == 'marketplace-e2e' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 35
    env:
      HOST_SHA: ${{ github.sha }}
      MARKETPLACE_SHA: ${{ inputs.marketplace_ref || vars.M4_MARKETPLACE_SHA }}
      SDK_SHA: ${{ inputs.sdk_ref || vars.M4_SDK_SHA }}
      EP_API_SHA: ${{ inputs.ep_api_ref || vars.M4_EP_API_SHA }}
      # These authorize only the ephemeral loopback database created by this
      # job. They are unique per run and are not production credentials.
      PUBLISHER_KEY: lvismkt_e2epub_${{ github.run_id }}_${{ github.run_attempt }}
      ADMIN_KEY: lvismkt_e2eadm_${{ github.run_id }}_${{ github.run_attempt }}
    steps:
      - name: Checkout lvis-app
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: lvis-app

      - name: Checkout lvis-marketplace
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lvis-project/lvis-marketplace
          path: lvis-marketplace
          ref: ${{ env.MARKETPLACE_SHA }}
          token: ${{ secrets.M4_MARKETPLACE_CHECKOUT_TOKEN }}
          submodules: recursive

      - name: Checkout lvis-plugin-sdk
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lvis-project/lvis-plugin-sdk
          path: lvis-plugin-sdk
          ref: ${{ env.SDK_SHA }}
          token: ${{ secrets.M4_MARKETPLACE_CHECKOUT_TOKEN }}

      - name: Checkout lvis-plugin-lge-api
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lvis-project/lvis-plugin-ep
          path: lvis-plugin-lge-api
          ref: ${{ env.EP_API_SHA }}
          token: ${{ secrets.M4_MARKETPLACE_CHECKOUT_TOKEN }}

      - name: Prove immutable checkout refs
        shell: bash
        run: |
          set -euo pipefail
          for value in "$HOST_SHA" "$MARKETPLACE_SHA" "$SDK_SHA" "$EP_API_SHA"; do
            if [[ ! "$value" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::Every cross-repository ref must be an exact lowercase 40-character SHA"
              exit 1
            fi
          done
          test "$(git -C lvis-app rev-parse HEAD)" = "$HOST_SHA"
          test "$(git -C lvis-marketplace rev-parse HEAD)" = "$MARKETPLACE_SHA"
          test "$(git -C lvis-plugin-sdk rev-parse HEAD)" = "$SDK_SHA"
          test "$(git -C lvis-plugin-lge-api rev-parse HEAD)" = "$EP_API_SHA"

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install marketplace server deps (uv)
        working-directory: lvis-marketplace/server
        run: |
          pip install -U pip uv
          uv sync --frozen --all-groups

      - name: Build plugin schemas (production-equivalent of Dockerfile RUN)
        working-directory: lvis-marketplace
        run: |
          # Production Dockerfile: COPY scripts/build_schemas.py /tmp/...
          # then RUN python /tmp/build_schemas.py — script lives at marketplace
          # repo root (scripts/), output goes to schemas/ at root.
          # Use server's uv venv via --directory for cryptography/jsonref deps.
          uv run --directory server --no-sync python /tmp/build_schemas_proxy.py 2>/dev/null || true
          # Direct invocation (script reads vendor/lvis-plugin-sdk/schemas/ and writes schemas/)
          (cd server && uv run python ../scripts/build_schemas.py)
          ls -la schemas/

      - name: Clean stale marketplace E2E DB
        run: |
          # github-hosted runners are ephemeral — there is no shared production
          # marketplace to protect (this was a self-hosted-only concern). Use a
          # dedicated port (8765, set below) and clean OUR pid file + sqlite DB
          # for idempotent reruns within the ephemeral VM.
          if [ -f /tmp/m4-marketplace.pid ]; then
            kill "$(cat /tmp/m4-marketplace.pid)" 2>/dev/null || true
            sleep 1
          fi
          rm -f /tmp/m4-marketplace.pid /tmp/m4-marketplace.db /tmp/m4-marketplace.db-wal /tmp/m4-marketplace.db-shm
          echo "stale E2E DB + tracked pid cleaned"

      - name: Seed publisher API key (before server start — avoids sqlite lock)
        env:
          MARKETPLACE_DB_URL: "sqlite+aiosqlite:////tmp/m4-marketplace.db"
        working-directory: lvis-marketplace/server
        run: |
          uv run python scripts/seed_e2e_keys.py \
            --publisher-key "$PUBLISHER_KEY" \
            --admin-key "$ADMIN_KEY"

      - name: Load committed poc-v1 test signer (loopback only)
        working-directory: lvis-marketplace/server
        run: |
          signer_json="$(uv run python scripts/print_test_poc_signer_env.py --format json)"
          signer="$(jq -er '.MARKETPLACE_SIGNING_PRIVATE_KEY_POC_V1' <<<"$signer_json")"
          echo "::add-mask::$signer"
          echo "MARKETPLACE_SIGNING_PRIVATE_KEY_POC_V1=$signer" >> "$GITHUB_ENV"

      - name: Start marketplace server (sqlite, background)
        working-directory: lvis-marketplace/server
        env:
          LVIS_MARKETPLACE_RATE_LIMIT_DISABLED: "1"
          MARKETPLACE_DB_URL: "sqlite+aiosqlite:////tmp/m4-marketplace.db"
          # bootstrap_on_startup runs managed-plugin git pulls + seeds an
          # internal admin key (prefix "seed_dev"). For M4 e2e we only need
          # the e2e-publisher row seeded above; bootstrap's concurrent DB
          # writes contend with our pre-seeded row under SQLite single-writer
          # semantics, leading to 401s after the seed step succeeds.
          LVIS_MARKETPLACE_SKIP_BOOTSTRAP: "1"
          # The immutable-input step proves the generated local schema matches
          # Host + SDK. Do not replace that pinned schema with mutable main.
          LVIS_MARKETPLACE_PLUGIN_SCHEMA_REMOTE_ENABLED: "false"
        run: |
          uv run uvicorn lvis_marketplace.main:create_app \
            --factory --host 127.0.0.1 --port 8765 \
            >/tmp/m4-server.log 2>&1 &
          echo $! > /tmp/m4-marketplace.pid
          # Wait for readiness.
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8765/api/v1/health >/dev/null; then
              echo "marketplace ready"; exit 0
            fi
            sleep 1
          done
          echo "marketplace failed to start" >&2; exit 1

      - name: Debug — inspect DB after seed + GET /me
        run: |
          sudo apt-get install -y sqlite3 >/dev/null 2>&1 || true
          echo "=== DB file ==="
          ls -la /tmp/m4-marketplace.db 2>&1 || echo "no DB file"
          echo "=== api_keys rows ==="
          sqlite3 /tmp/m4-marketplace.db "SELECT id,label,role,revoked_at,key_prefix,LENGTH(key_hash) FROM api_keys" 2>&1 || true
          echo "=== publisher key length / first chars ==="
          echo "len=$(printf '%s' "$PUBLISHER_KEY" | wc -c) prefix=$(printf '%s' "$PUBLISHER_KEY" | head -c 12)"
          echo "=== GET /me via server background ==="
          curl -s -w "\nHTTP %{http_code}\n" -H "Authorization: Bearer $PUBLISHER_KEY" http://127.0.0.1:8765/api/v1/me 2>&1 | head -5
          echo "=== expected hash (sha256 of plaintext) ==="
          printf '%s' "$PUBLISHER_KEY" | sha256sum | head -c 32 ; echo

      - name: Setup Node (required by postinstall + build scripts)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Build and package exact EP attendance bundle
        working-directory: lvis-plugin-lge-api
        env:
          EP_API_BUNDLE_PATH: /tmp/lvis-plugin-ep-${{ env.EP_API_SHA }}.zip
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EP_API_SHA"
          test -z "$(git status --porcelain --untracked-files=no)"
          bun install --frozen-lockfile
          bun run build
          test -f dist/hostPlugin.js
          test -f dist/ui/lge-control.js
          rm -f "$EP_API_BUNDLE_PATH"
          zip -X -q -r "$EP_API_BUNDLE_PATH" plugin.json dist skills
          test -s "$EP_API_BUNDLE_PATH"
          test -z "$(git status --porcelain --untracked-files=no)"
          sha256sum "$EP_API_BUNDLE_PATH"

      - name: Install Electron display dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          bunx playwright install-deps chromium

      - name: Install app deps
        working-directory: lvis-app
        run: bun install --frozen-lockfile

      - name: Prove consumed SDK and cross-repository schema identity
        working-directory: lvis-app
        env:
          HOST_ROOT: .
          SDK_ROOT: ../lvis-plugin-sdk
          MARKETPLACE_ROOT: ../lvis-marketplace
          EP_API_ROOT: ../lvis-plugin-lge-api
          BUNDLE_E2E_EVIDENCE_PATH: /tmp/marketplace-live-lifecycle-evidence.json
        run: |
          bun run test:plugin-bundle-inputs
          node scripts/plugin-bundle-e2e-inputs.mjs

      - name: Build Host Electron bundle
        working-directory: lvis-app
        run: bun run build

      - name: Prove secure evidence file handling
        working-directory: lvis-app
        env:
          M4_E2E: "1"
        run: bun run test:vitest -- run test/e2e/evidence-file.test.ts

      - name: Run live installer transport proof
        working-directory: lvis-app
        env:
          M4_E2E: "1"
          MARKETPLACE_URL: http://127.0.0.1:8765
          MARKETPLACE_PUBLISHER_KEY: ${{ env.PUBLISHER_KEY }}
          MARKETPLACE_ADMIN_KEY: ${{ env.ADMIN_KEY }}
        run: |
          M4_E2E=1 bun run test:vitest -- run --reporter=verbose \
            test/e2e/marketplace-e2e-fixture.test.ts \
            test/e2e/marketplace-e2e.test.ts

      - name: Run live Electron IPC lifecycle
        working-directory: lvis-app
        env:
          M4_E2E: "1"
          MARKETPLACE_URL: http://127.0.0.1:8765
          MARKETPLACE_PUBLISHER_KEY: ${{ env.PUBLISHER_KEY }}
          MARKETPLACE_ADMIN_KEY: ${{ env.ADMIN_KEY }}
          BUNDLE_E2E_EVIDENCE_PATH: /tmp/marketplace-live-lifecycle-evidence.json
        run: >-
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24"
          bunx playwright test test/e2e/ui/marketplace-live-lifecycle.spec.ts --workers=1

      - name: Run exact EP attendance read-write-readback lifecycle
        working-directory: lvis-app
        env:
          M4_E2E: "1"
          MARKETPLACE_URL: http://127.0.0.1:8765
          MARKETPLACE_PUBLISHER_KEY: ${{ env.PUBLISHER_KEY }}
          MARKETPLACE_ADMIN_KEY: ${{ env.ADMIN_KEY }}
          EP_API_BUNDLE_PATH: /tmp/lvis-plugin-ep-${{ env.EP_API_SHA }}.zip
          BUNDLE_E2E_EVIDENCE_PATH: /tmp/marketplace-live-lifecycle-evidence.json
        run: >-
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24"
          bunx playwright test test/e2e/ui/ep-attendance-live.spec.ts --workers=1

      - name: Run loopback reverse-containment rehearsal
        working-directory: lvis-app
        env:
          M4_E2E: "1"
          MARKETPLACE_URL: http://127.0.0.1:8765
          MARKETPLACE_PUBLISHER_KEY: ${{ env.PUBLISHER_KEY }}
          MARKETPLACE_ADMIN_KEY: ${{ env.ADMIN_KEY }}
          SDK_ROOT: ../lvis-plugin-sdk
          BUNDLE_E2E_EVIDENCE_PATH: /tmp/marketplace-live-lifecycle-evidence.json
        run: >-
          bun run test:vitest -- run --reporter=verbose
          test/e2e/marketplace-containment-rehearsal.test.ts

      - name: Dump marketplace server log (always)
        if: always()
        run: |
          echo "=== /tmp/m4-server.log ==="
          tail -200 /tmp/m4-server.log 2>&1 || echo "no server log"

      - name: Upload immutable-ref evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: marketplace-live-lifecycle-evidence-${{ github.sha }}
          path: |
            /tmp/marketplace-live-lifecycle-evidence.json
            lvis-app/test-results/**
          if-no-files-found: error

      - name: Stop marketplace
        if: always()
        run: |
          if [ -f /tmp/m4-marketplace.pid ]; then
            kill "$(cat /tmp/m4-marketplace.pid)" || true
          fi
