name: Marketplace E2E (publish ↔ install)

# This secret-bearing workflow is intentionally dispatch-only. GitHub loads a
# repository_dispatch workflow from the default branch, so candidate PR code
# can be checked out as data without controlling the trusted resolver or job.
on:
  repository_dispatch:
    types: [marketplace-e2e]

permissions:
  contents: read
  pull-requests: read

jobs:
  marketplace-e2e:
    name: Marketplace E2E (live lifecycle + containment)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 35
    env:
      # These authorize only the ephemeral loopback database created by this
      # job. They are unique per run and are not production credentials.
      PUBLISHER_KEY: lvismkt_e2epub_${{ github.run_id }}_${{ github.run_attempt }}
      ADMIN_KEY: lvismkt_e2eadm_${{ github.run_id }}_${{ github.run_attempt }}
    steps:
      - name: Resolve trusted candidate snapshot
        id: candidates
        shell: bash
        env:
          DISPATCH_PAYLOAD: ${{ toJSON(github.event.client_payload) }}
          PUBLIC_API_TOKEN: ${{ github.token }}
          PRIVATE_API_TOKEN: ${{ secrets.M4_MARKETPLACE_CHECKOUT_TOKEN }}
        run: |
          set -euo pipefail
          set +x

          fail() {
            echo "::error::$1" >&2
            exit 1
          }

          api_with_token() {
            local token="$1"
            local endpoint="$2"
            GH_TOKEN="$token" gh api \
              -H "Accept: application/vnd.github+json" \
              "$endpoint"
          }

          payload_value() {
            local key="$1"
            jq -er --arg key "$key" '
              if has($key) then
                .[$key]
                | if type == "number" or type == "string"
                  then tostring
                  else error("selector must be a number or string")
                  end
              else
                ""
              end
            ' <<<"$DISPATCH_PAYLOAD"
          }

          resolve_pr() {
            local repo="$1"
            local pr_number="$2"
            local token="$3"
            local response

            [[ "$pr_number" =~ ^[1-9][0-9]*$ ]] \
              || fail "$repo PR selector must be a positive integer"
            response="$(api_with_token "$token" "repos/$repo/pulls/$pr_number")"
            jq -er --arg repo "$repo" '
              if .state != "open" then
                error("candidate PR is not open")
              elif .base.repo.full_name != $repo or .base.ref != "main" then
                error("candidate PR does not target this repository main branch")
              elif .head.repo.full_name != $repo then
                error("candidate PR head is not from the same repository")
              elif (.head.sha | type) != "string"
                or (.head.sha | test("^[0-9a-f]{40}$") | not)
              then
                error("candidate PR head is not an exact lowercase commit SHA")
              else
                .head.sha
              end
            ' <<<"$response"
          }

          resolve_main_sha() {
            local repo="$1"
            local requested_sha="$2"
            local token="$3"
            local resolved_sha
            local comparison

            [[ "$requested_sha" =~ ^[0-9a-f]{40}$ ]] \
              || fail "$repo main SHA selector must be an exact lowercase 40-character SHA"
            resolved_sha="$(
              api_with_token "$token" "repos/$repo/commits/$requested_sha" \
                | jq -er --arg requested "$requested_sha" '
                    if .sha == $requested then .sha
                    else error("commit API did not resolve the exact requested SHA")
                    end
                  '
            )"
            comparison="$(
              api_with_token "$token" "repos/$repo/compare/${resolved_sha}...main"
            )"
            jq -e --arg resolved "$resolved_sha" '
              (.status == "ahead" or .status == "identical")
              and .base_commit.sha == $resolved
            ' <<<"$comparison" >/dev/null \
              || fail "$repo SHA is not on main"
            printf '%s\n' "$resolved_sha"
          }

          resolve_candidate() {
            local repo="$1"
            local prefix="$2"
            local token="$3"
            local pr_number
            local main_sha

            pr_number="$(payload_value "${prefix}_pr")"
            main_sha="$(payload_value "${prefix}_sha")"
            if [[ -n "$pr_number" && -n "$main_sha" ]]; then
              fail "$repo dispatch must provide only ${prefix}_pr or ${prefix}_sha"
            fi
            if [[ -z "$pr_number" && -z "$main_sha" ]]; then
              fail "$repo dispatch must provide ${prefix}_pr or ${prefix}_sha"
            fi
            if [[ -n "$pr_number" ]]; then
              resolve_pr "$repo" "$pr_number" "$token"
            else
              resolve_main_sha "$repo" "$main_sha" "$token"
            fi
          }

          schema_version="$(payload_value schema_version)"
          [[ "$schema_version" == "1" ]] \
            || fail "client_payload.schema_version must be 1"
          jq -e '
            (keys - [
              "schema_version",
              "host_pr", "host_sha",
              "marketplace_pr", "marketplace_sha",
              "sdk_pr", "sdk_sha",
              "ep_pr", "ep_sha"
            ]) | length == 0
          ' <<<"$DISPATCH_PAYLOAD" >/dev/null \
            || fail "client_payload contains an unsupported field"

          [[ -n "$PUBLIC_API_TOKEN" ]] || fail "trusted GitHub API token is unavailable"
          [[ -n "$PRIVATE_API_TOKEN" ]] || fail "M4 private repository token is unavailable"

          host_sha="$(
            resolve_candidate "lvis-project/lvis-app" "host" "$PUBLIC_API_TOKEN"
          )"
          marketplace_sha="$(
            resolve_candidate "lvis-project/lvis-marketplace" "marketplace" "$PRIVATE_API_TOKEN"
          )"
          sdk_sha="$(
            resolve_candidate "lvis-project/lvis-plugin-sdk" "sdk" "$PUBLIC_API_TOKEN"
          )"
          ep_sha="$(
            resolve_candidate "lvis-project/lvis-plugin-ep" "ep" "$PRIVATE_API_TOKEN"
          )"

          {
            echo "host_sha=$host_sha"
            echo "marketplace_sha=$marketplace_sha"
            echo "sdk_sha=$sdk_sha"
            echo "ep_sha=$ep_sha"
          } >>"$GITHUB_OUTPUT"
          {
            echo "HOST_SHA=$host_sha"
            echo "MARKETPLACE_SHA=$marketplace_sha"
            echo "SDK_SHA=$sdk_sha"
            echo "EP_API_SHA=$ep_sha"
          } >>"$GITHUB_ENV"

      - name: Checkout exact lvis-app candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lvis-project/lvis-app
          path: .candidate/host
          ref: ${{ steps.candidates.outputs.host_sha }}
          fetch-depth: 0
          lfs: false
          submodules: false
          persist-credentials: false

      - name: Checkout exact lvis-marketplace candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lvis-project/lvis-marketplace
          path: .candidate/marketplace
          ref: ${{ steps.candidates.outputs.marketplace_sha }}
          token: ${{ secrets.M4_MARKETPLACE_CHECKOUT_TOKEN }}
          fetch-depth: 0
          lfs: false
          submodules: false
          persist-credentials: false

      - name: Checkout exact lvis-plugin-sdk candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lvis-project/lvis-plugin-sdk
          path: .candidate/sdk
          ref: ${{ steps.candidates.outputs.sdk_sha }}
          fetch-depth: 0
          lfs: false
          submodules: false
          persist-credentials: false

      - name: Checkout exact lvis-plugin-ep candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lvis-project/lvis-plugin-ep
          path: .candidate/ep
          ref: ${{ steps.candidates.outputs.ep_sha }}
          token: ${{ secrets.M4_MARKETPLACE_CHECKOUT_TOKEN }}
          fetch-depth: 0
          lfs: false
          submodules: false
          persist-credentials: false

      - name: Prove candidate checkout credentials are isolated
        shell: bash
        run: |
          set -euo pipefail

          assert_no_local_credentials() {
            local repo="$1"
            if git -C "$repo" config --local --get-regexp \
              '^(http\..*\.extraheader|credential\..*)$'; then
              echo "::error::Credential-bearing local git config remains in $repo"
              exit 1
            fi
            remote_url="$(git -C "$repo" remote get-url origin)"
            if [[ "$remote_url" =~ ^https?://[^/]*@ ]]; then
              echo "::error::Credential-bearing origin URL remains in $repo"
              exit 1
            fi
          }

          for repo in \
            .candidate/host \
            .candidate/marketplace \
            .candidate/sdk \
            .candidate/ep
          do
            assert_no_local_credentials "$repo"
            if [[ -e "$repo/.gitmodules" ]]; then
              [[ -f "$repo/.gitmodules" && ! -L "$repo/.gitmodules" ]] || {
                echo "::error::.gitmodules must remain inert regular data"
                exit 1
              }
              sha256sum "$repo/.gitmodules" >/dev/null
            fi
          done

      - name: Prove immutable checkout refs
        shell: bash
        run: |
          set -euo pipefail
          for value in "$HOST_SHA" "$MARKETPLACE_SHA" "$SDK_SHA" "$EP_API_SHA"; do
            if [[ ! "$value" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::Every cross-repository ref must be an exact lowercase 40-character SHA"
              exit 1
            fi
          done
          test "$(git -C .candidate/host rev-parse HEAD)" = "$HOST_SHA"
          test "$(git -C .candidate/marketplace rev-parse HEAD)" = "$MARKETPLACE_SHA"
          test "$(git -C .candidate/sdk rev-parse HEAD)" = "$SDK_SHA"
          test "$(git -C .candidate/ep rev-parse HEAD)" = "$EP_API_SHA"
          for repo in \
            .candidate/host \
            .candidate/marketplace \
            .candidate/sdk \
            .candidate/ep
          do
            test -z "$(
              git -C "$repo" status --porcelain=v1 \
                --untracked-files=all --ignore-submodules=none
            )"
          done

      - name: Checkout exact trusted workflow control plane without credentials
        shell: bash
        env:
          CONTROL_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail
          [[ "$CONTROL_SHA" =~ ^[0-9a-f]{40}$ ]]
          install -d -m 0700 .control/git-home .control/trusted
          export HOME="$PWD/.control/git-home"
          export GIT_CONFIG_GLOBAL=/dev/null
          export GIT_CONFIG_SYSTEM=/dev/null
          export GIT_TERMINAL_PROMPT=0
          git -C .control/trusted init --quiet
          git -C .control/trusted remote add origin \
            https://github.com/lvis-project/lvis-app.git
          git -C .control/trusted \
            -c credential.helper= \
            -c http.extraHeader= \
            fetch --quiet --depth=1 --no-tags origin "$CONTROL_SHA"
          git -C .control/trusted checkout --quiet --detach FETCH_HEAD
          test "$(git -C .control/trusted rev-parse HEAD)" = "$CONTROL_SHA"
          test -z "$(git -C .control/trusted status --porcelain=v1)"
          if git -C .control/trusted config --local --get-regexp \
            '^(http\..*\.extraheader|credential\..*)$'
          then
            echo "::error::Trusted control checkout retained credentials"
            exit 1
          fi

      - name: Seal exact candidate archives and bindings
        shell: bash
        env:
          CONTROL_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail
          umask 077
          install -d -m 0700 \
            .control/snapshots \
            .control/contexts \
            .control/evidence \
            .control/artifacts

          validate_archive() {
            local archive="$1"
            python3 - "$archive" <<'PY'
          import posixpath
          import sys
          import tarfile

          with tarfile.open(sys.argv[1], "r:") as archive:
              for member in archive:
                  normalized = posixpath.normpath(member.name)
                  if (
                      member.name.startswith("/")
                      or normalized == ".."
                      or normalized.startswith("../")
                      or member.ischr()
                      or member.isblk()
                      or member.isfifo()
                      or member.isdev()
                      or member.islnk()
                  ):
                      raise SystemExit(f"unsafe archive member: {member.name!r}")
                  if member.issym():
                      target = posixpath.normpath(
                          posixpath.join(posixpath.dirname(member.name), member.linkname)
                      )
                      if member.linkname.startswith("/") or target.startswith("../"):
                          raise SystemExit(f"escaping archive symlink: {member.name!r}")
          PY
          }

          archive_repo() {
            local name="$1"
            local repo="$2"
            local expected="$3"
            local archive=".control/snapshots/${name}.tar"
            local context=".control/contexts/${name}"
            local commit tree archive_sha gitmodules_sha
            commit="$(git -C "$repo" rev-parse HEAD)"
            tree="$(git -C "$repo" rev-parse 'HEAD^{tree}')"
            [[ "$commit" == "$expected" ]]
            git -C "$repo" archive --format=tar HEAD >"$archive"
            validate_archive "$archive"
            archive_sha="$(sha256sum "$archive" | cut -d' ' -f1)"
            gitmodules_sha=null
            if [[ -e "$repo/.gitmodules" ]]; then
              [[ -f "$repo/.gitmodules" && ! -L "$repo/.gitmodules" ]]
              gitmodules_sha="$(
                sha256sum "$repo/.gitmodules" | cut -d' ' -f1
              )"
            fi
            install -d -m 0700 "$context"
            tar -xf "$archive" -C "$context"
            find "$context" -name .git -print -quit | grep -q . && {
              echo "::error::Candidate archive contained Git metadata"
              exit 1
            }
            jq -n \
              --arg key "$name" \
              --arg commit "$commit" \
              --arg tree "$tree" \
              --arg archiveSha256 "$archive_sha" \
              --arg gitmodulesSha256 "$gitmodules_sha" \
              '{
                key:$key,
                value:{
                  commit:$commit,
                  tree:$tree,
                  archiveSha256:$archiveSha256,
                  gitmodulesSha256:
                    (if $gitmodulesSha256 == "null"
                     then null else $gitmodulesSha256 end)
                }
              }' \
              >".control/snapshots/${name}.json"
          }

          archive_repo host .candidate/host "$HOST_SHA"
          archive_repo marketplace .candidate/marketplace "$MARKETPLACE_SHA"
          archive_repo sdk .candidate/sdk "$SDK_SHA"
          archive_repo ep .candidate/ep "$EP_API_SHA"

          host_electron_spec="$(
            jq -er '.devDependencies.electron // .dependencies.electron' \
              .candidate/host/package.json
          )"
          [[ "$host_electron_spec" == "^43.0.0" \
            || "$host_electron_spec" == "43.0.0" ]]
          host_electron_lock="$(
            node -e '
              const lock = require("node:fs").readFileSync(process.argv[1], "utf8");
              const match = lock.match(/"electron": \["electron@([^"]+)"/u);
              if (!match) process.exit(1);
              process.stdout.write(match[1]);
            ' .candidate/host/bun.lock
          )"
          [[ "$host_electron_lock" == "43.0.0" ]]

          rm -rf .control/contexts/marketplace/vendor/lvis-plugin-sdk
          install -d -m 0700 \
            .control/contexts/marketplace/vendor/lvis-plugin-sdk
          tar -xf .control/snapshots/sdk.tar \
            -C .control/contexts/marketplace/vendor/lvis-plugin-sdk

          sdk_version="$(jq -er '.version' .candidate/sdk/package.json)"
          sdk_schema_sha="$(
            sha256sum .candidate/sdk/schemas/plugin-manifest.schema.json \
              | cut -d' ' -f1
          )"
          jq -n \
            --arg version "$sdk_version" \
            --arg schemaSha256 "$sdk_schema_sha" \
            '{version:$version,schemaSha256:$schemaSha256}' \
            >.control/artifacts/sdk-evidence.json
          jq -s \
            --arg runId "$GITHUB_RUN_ID" \
            --arg runAttempt "$GITHUB_RUN_ATTEMPT" \
            --arg controlSha "$CONTROL_SHA" \
            --arg workflowRef "$GITHUB_WORKFLOW_REF" \
            --arg sdkVersion "$sdk_version" \
            --arg sdkSchemaSha256 "$sdk_schema_sha" \
            '{
              schemaVersion:1,
              repository:"lvis-project/lvis-app",
              runId:$runId,
              runAttempt:$runAttempt,
              controlSha:$controlSha,
              workflowRef:$workflowRef,
              sdkVersion:$sdkVersion,
              sdkSchemaSha256:$sdkSchemaSha256,
              inputs:(map({(.key):.value}) | add)
            }' \
            .control/snapshots/host.json \
            .control/snapshots/marketplace.json \
            .control/snapshots/sdk.json \
            .control/snapshots/ep.json \
            >.control/evidence/input-bindings.json

      - name: Prove sealed contract and trusted harness identity
        shell: bash
        env:
          CONTROL_SHA: ${{ github.workflow_sha }}
          HOST_ROOT: .candidate/host
          SDK_ROOT: .candidate/sdk
          MARKETPLACE_ROOT: .candidate/marketplace
          EP_API_ROOT: .candidate/ep
          BUNDLE_E2E_EVIDENCE_PATH: .control/evidence/input-contract.json
        run: |
          set -euo pipefail
          node .control/trusted/scripts/plugin-bundle-e2e-inputs.mjs
          node \
            .control/trusted/test/control/marketplace-e2e/create-harness-manifest.mjs \
            .control/trusted \
            "$CONTROL_SHA" \
            .control/evidence/control-harness-manifest.json

      - name: Run sealed container control and hostile containment rehearsal
        shell: bash
        env:
          CONTROL_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail
          bash .control/trusted/test/control/marketplace-e2e/orchestrate.sh

      - name: Upload validated public evidence only
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: marketplace-live-lifecycle-evidence-${{ steps.candidates.outputs.host_sha }}
          path: .control/export/validated-summary.json
          if-no-files-found: error
