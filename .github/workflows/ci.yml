name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-and-test:
    # All runs use ephemeral GitHub-hosted ARM64 runners. Ephemeral VMs
    # cannot persist state or exfiltrate secrets across runs, which closes
    # the "pwn-request" supply-chain RCE vector that made the prior
    # self-hosted Oracle runner risky for fork PRs (a fork controls
    # package.json + postinstall scripts, and `bun install` would execute
    # attacker code). ARM64 keeps native-module (better-sqlite3 etc.) parity
    # with the dev fleet. Fork-PR secret access is still gated at the sibling
    # clone step below (skipped when no LVIS_REPO_READ_TOKEN is available).
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
        with:
          path: lvis-app
      - name: Clone sibling plugin repos
        id: siblings
        # Sibling plugin repos are private. Two contexts lack the
        # LVIS_REPO_READ_TOKEN secret: fork PRs (GitHub withholds secrets
        # from forks) and Dependabot PRs (GitHub runs Dependabot in a
        # restricted context that also withholds repo secrets, even though
        # the PR originates from the same repository). In both cases an
        # authenticated clone is impossible, and an unauthenticated clone of
        # a private repo fails hard ("could not read Username" -> exit 128),
        # which would red-X the whole job. So when no token is resolvable we
        # SKIP the clone, record siblings-available=false, and let the host's
        # own build+test continue — they do not import sibling sources (the
        # app builds and tests entirely from lvis-app/src), so coverage on
        # the no-token path is identical to the token path today.
        env:
          LVIS_REPO_READ_TOKEN: ${{ secrets.LVIS_REPO_READ_TOKEN }}
        run: |
          set -euo pipefail
          repo_token="${LVIS_REPO_READ_TOKEN:-}"
          if [ -z "$repo_token" ] && gh auth status --hostname github.com >/dev/null 2>&1; then
            repo_token="$(gh auth token)"
          fi
          if [ -z "$repo_token" ]; then
            # No token (Dependabot / fork PR). Do NOT attempt an
            # unauthenticated private clone — it fails with exit 128 and
            # reds the job. Degrade gracefully so the core build+test runs.
            echo "::notice::No LVIS_REPO_READ_TOKEN or gh auth token available (Dependabot/fork PR context); skipping private sibling-plugin clones. Core build+test still runs."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::add-mask::$repo_token"
          echo "available=true" >> "$GITHUB_OUTPUT"
          sibling_ref="${LVIS_SIBLING_REPO_REF:-${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}}"
          for slug in lvis-plugin-meeting lvis-plugin-local-indexer lvis-plugin-work-assistant lvis-plugin-ms-graph; do
            if [ -d "$slug" ]; then rm -rf "$slug"; fi
            clone_url="https://x-access-token:${repo_token}@github.com/lvis-project/${slug}.git"
            if [ -n "$sibling_ref" ] && git ls-remote --exit-code --heads "$clone_url" "$sibling_ref" >/dev/null 2>&1; then
              echo "Cloning ${slug}@${sibling_ref}"
              git clone --depth 1 --branch "$sibling_ref" "$clone_url" "$slug"
            else
              echo "Cloning ${slug}@default"
              git clone --depth 1 "$clone_url" "$slug"
            fi
          done
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-ci-bun-${{ hashFiles('lvis-app/bun.lock') }}
          restore-keys: ${{ runner.os }}-ci-bun-
      # Cache the built node_modules (Electron dist + electron-rebuilt native
      # modules) keyed on os+arch+lockfile. On a hit, `bun install` restores the
      # ABI-correct binaries without re-downloading Electron or recompiling
      # better-sqlite3/node-pty. Exact-key only — a lockfile change (which pins
      # the Electron version) misses and rebuilds, so a stale ABI never leaks in.
      - uses: actions/cache@v6
        with:
          path: lvis-app/node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-ci-nm-${{ hashFiles('lvis-app/bun.lock') }}
      - run: bun install --frozen-lockfile
        working-directory: lvis-app
      # uv is fetched to resources/ (outside node_modules) by the postinstall,
      # which bun skips when node_modules is already satisfied from cache. Ensure
      # it explicitly — fetch-uv is idempotent (no-op when already present).
      - name: Ensure uv toolchain
        working-directory: lvis-app
        run: node scripts/fetch-uv.mjs
      - name: Run deterministic Knip gate
        working-directory: lvis-app
        run: bun run check:knip && bun run test:knip-gate
      # Postinstall leaves native modules on Electron's ABI. The shared Vitest
      # runner uses ELECTRON_RUN_AS_NODE, so tests and the desktop runtime consume
      # that same binary without an in-place Node-ABI rebuild.
      - run: bun run build
        working-directory: lvis-app
      - name: Remove root-level Bun binary shims before Vitest
        working-directory: lvis-app
        run: rm -f ajv pino
      - name: Run quality-gated tests
        # Intentionally NOT gated on steps.siblings.outputs.available: the
        # build above and this suite resolve entirely from lvis-app/src and
        # never import a sibling plugin's sources from disk (sibling slugs
        # appear only as string fixtures and as specs passed to mocked
        # installers). They therefore run — and must stay green — on the
        # no-token (Dependabot/fork) path too. If a future plugin-integration
        # or e2e step is added that genuinely needs the cloned siblings on
        # disk, gate ONLY that step with:
        #   if: steps.siblings.outputs.available == 'true'
        # so it no-ops on the no-token path without weakening this core gate.
        run: bun run check:test-quality
        working-directory: lvis-app

  windows-permission-tests:
    name: Windows permission path tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          path: lvis-app
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-ci-bun-${{ hashFiles('lvis-app/bun.lock') }}
          restore-keys: ${{ runner.os }}-ci-bun-
      - uses: actions/cache@v6
        with:
          path: lvis-app/node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-ci-nm-${{ hashFiles('lvis-app/bun.lock') }}
      - run: bun install --frozen-lockfile
        working-directory: lvis-app
      - name: Run Windows permission regressions
        working-directory: lvis-app
        run: >
          bun run test --
          src/permissions/__tests__/allowed-directories.test.ts
          src/permissions/__tests__/permission-manager-meta-override.test.ts
          src/tools/__tests__/executor.test.ts
          src/tools/__tests__/registry-meta-governance.test.ts
          src/tools/__tests__/executor-rationale-batch.test.ts
          src/tools/pipeline/__tests__/rationale-host-coordinator.test.ts
          src/tools/pipeline/__tests__/rationale-host-service.test.ts
          src/tools/pipeline/__tests__/rationale-invocation-journal.test.ts
          src/tools/pipeline/__tests__/rationale-ticket-store.test.ts
          src/engine/turn/__tests__/rationale-real-stack.integration.test.ts
          src/audit/__tests__/hmac-chain.test.ts
          src/audit/__tests__/rationale-audit-adapter.test.ts
          src/boot/__tests__/plugin-surface-permissions.test.ts
          src/permissions/__tests__/windows-sandbox-logic.test.ts
          src/lib/__tests__/atomic-file.test.ts
          src/lib/__tests__/with-file-lock.test.ts
          src/data/__tests__/secret-document-store.test.ts
          src/plugins/__tests__/registry-atomicity.test.ts
          src/plugins/__tests__/registry-migration.test.ts
          src/plugins/__tests__/installed-entry-fs.test.ts
          src/plugins/__tests__/plugin-artifact-store-windows-lock.test.ts
          src/plugins/__tests__/marketplace-managed-bootstrap.test.ts
          src/plugins/__tests__/marketplace-update-recovery.test.ts
          src/plugins/__tests__/marketplace-dispatcher.test.ts
          src/plugins/__tests__/install-local.test.ts
          src/plugins/__tests__/trust-boundary.test.ts

  macos-permission-tests:
    name: macOS permission path tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          path: lvis-app
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-ci-bun-${{ hashFiles('lvis-app/bun.lock') }}
          restore-keys: ${{ runner.os }}-ci-bun-
      - uses: actions/cache@v6
        with:
          path: lvis-app/node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-ci-nm-${{ hashFiles('lvis-app/bun.lock') }}
      - run: bun install --frozen-lockfile
        working-directory: lvis-app
      - name: Run macOS permission regressions
        working-directory: lvis-app
        run: >
          bun run test --
          src/permissions/__tests__/allowed-directories.test.ts
          src/permissions/__tests__/permission-manager-meta-override.test.ts
          src/tools/__tests__/registry-meta-governance.test.ts
          src/tools/__tests__/executor-rationale-batch.test.ts
          src/tools/pipeline/__tests__/rationale-host-coordinator.test.ts
          src/tools/pipeline/__tests__/rationale-host-service.test.ts
          src/tools/pipeline/__tests__/rationale-invocation-journal.test.ts
          src/tools/pipeline/__tests__/rationale-ticket-store.test.ts
          src/engine/turn/__tests__/rationale-real-stack.integration.test.ts
          src/audit/__tests__/hmac-chain.test.ts
          src/audit/__tests__/rationale-audit-adapter.test.ts
          src/data/__tests__/secret-document-store.test.ts
