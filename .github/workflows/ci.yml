name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
      - name: Stub sibling plugin packages for CI
        run: |
          for pkg in meeting email pageindex calendar; do
            dir="../lvis-plugin-$pkg"
            mkdir -p "$dir/dist"
            printf '{"name":"@lvis/plugin-%s","version":"0.0.0","main":"dist/hostPlugin.js"}\n' "$pkg" > "$dir/package.json"
            touch "$dir/dist/hostPlugin.js"
          done
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bunx vitest run
