name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  build-and-test:
    # All runs use ephemeral GitHub-hosted ARM64 runners. Ephemeral VMs
    # cannot persist state or exfiltrate secrets across runs, which closes
    # the "pwn-request" supply-chain RCE vector that made the prior
    # self-hosted Oracle runner risky for fork PRs (a fork controls
    # package.json + postinstall scripts, and `bun install` would execute
    # attacker code). ARM64 keeps native-module (better-sqlite3 etc.) parity
    # with the dev fleet. Fork-PR secret access is still gated at the sibling
    # clone step below (skipped when no LVIS_REPO_READ_TOKEN is available).
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
        with:
          path: lvis-app
      - name: Clone sibling plugin repos
        # Sibling plugin repos are private; fork PRs cannot access the
        # LVIS_REPO_READ_TOKEN secret. Skip cloning on fork PRs so host
        # build+test still runs and reports status to the contributor.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          LVIS_REPO_READ_TOKEN: ${{ secrets.LVIS_REPO_READ_TOKEN }}
        run: |
          set -euo pipefail
          repo_token="${LVIS_REPO_READ_TOKEN:-}"
          if [ -z "$repo_token" ] && gh auth status --hostname github.com >/dev/null 2>&1; then
            repo_token="$(gh auth token)"
          fi
          if [ -n "$repo_token" ]; then
            echo "::add-mask::$repo_token"
          else
            echo "::warning::No LVIS_REPO_READ_TOKEN or gh auth token available; attempting unauthenticated sibling clones."
          fi
          sibling_ref="${LVIS_SIBLING_REPO_REF:-${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-}}}"
          for slug in lvis-plugin-meeting lvis-plugin-local-indexer lvis-plugin-work-assistant lvis-plugin-ms-graph; do
            if [ -d "$slug" ]; then rm -rf "$slug"; fi
            clone_url="https://github.com/lvis-project/${slug}.git"
            if [ -n "$repo_token" ]; then
              clone_url="https://x-access-token:${repo_token}@github.com/lvis-project/${slug}.git"
            fi
            if [ -n "$sibling_ref" ] && git ls-remote --exit-code --heads "$clone_url" "$sibling_ref" >/dev/null 2>&1; then
              echo "Cloning ${slug}@${sibling_ref}"
              git clone --depth 1 --branch "$sibling_ref" "$clone_url" "$slug"
            else
              echo "Cloning ${slug}@default"
              git clone --depth 1 "$clone_url" "$slug"
            fi
          done
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: lvis-app
      - run: bun run build
        working-directory: lvis-app
      - name: Remove root-level Bun binary shims before Vitest
        working-directory: lvis-app
        run: rm -f ajv pino
      - name: Run quality-gated tests
        run: bun run check:test-quality
        working-directory: lvis-app

  windows-permission-tests:
    name: Windows permission path tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          path: lvis-app
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: lvis-app
      - name: Run Windows permission regressions
        working-directory: lvis-app
        run: >
          bun run test --
          src/permissions/__tests__/allowed-directories.test.ts
          src/tools/__tests__/executor.test.ts
          src/boot/__tests__/plugin-surface-permissions.test.ts
