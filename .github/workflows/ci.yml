name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: lvis-app
          submodules: recursive
      - name: Generate plugin read token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: lvis-project
          repositories: lvis-plugin-meeting,lvis-plugin-email,lvis-plugin-pageindex,lvis-plugin-calendar,lvis-plugin-lge-api
      - uses: actions/checkout@v6
        with:
          repository: lvis-project/lvis-plugin-meeting
          path: lvis-plugin-meeting
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/checkout@v6
        with:
          repository: lvis-project/lvis-plugin-email
          path: lvis-plugin-email
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/checkout@v6
        with:
          repository: lvis-project/lvis-plugin-pageindex
          path: lvis-plugin-pageindex
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/checkout@v6
        with:
          repository: lvis-project/lvis-plugin-calendar
          path: lvis-plugin-calendar
          token: ${{ steps.app-token.outputs.token }}
      - uses: actions/checkout@v6
        with:
          repository: lvis-project/lvis-plugin-lge-api
          path: lvis-plugin-lge-api
          token: ${{ steps.app-token.outputs.token }}
      - uses: oven-sh/setup-bun@v2
      - name: Build plugin-sdk submodule
        run: |
          cd lvis-app/packages/plugin-sdk
          bun install --frozen-lockfile
          bun run build
      - run: bun install --frozen-lockfile
        working-directory: lvis-app
      - run: bun run build
        working-directory: lvis-app
      - run: bunx vitest run
        working-directory: lvis-app


