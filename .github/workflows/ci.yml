name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  build-and-test:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Linux, ARM64, oracle]
    steps:
      - uses: actions/checkout@v6
        with:
          path: lvis-app
      - name: Clone sibling plugin repos
        # Self-hosted runner has gh CLI authenticated as ubuntu user (repo scope).
        # We use that token instead of GitHub App auth — the App is install-pinned
        # to a different repo set and cannot be modified without org-owner UI access.
        run: |
          set -euo pipefail
          GH_TOKEN=$(gh auth token)
          for slug in lvis-plugin-meeting lvis-plugin-pageindex lvis-plugin-lge-api lvis-plugin-work-proactive lvis-plugin-agent-hub lvis-plugin-ms-graph; do
            if [ -d "$slug" ]; then rm -rf "$slug"; fi
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/lvis-project/${slug}.git" "$slug"
          done
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: lvis-app
      - name: Check plugin SDK drift
        run: bun run --cwd packages/plugin-sdk check:drift
        working-directory: lvis-app
      - run: bun run build
        working-directory: lvis-app
      - run: bunx vitest run
        working-directory: lvis-app


