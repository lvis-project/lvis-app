name: Playwright E2E (Electron)

# Secret-bearing private sibling checkouts run only from trusted default-branch
# workflow code. Runs on:
#   - repository_dispatch with an exact main-ancestor Host SHA
#   - a nightly schedule against main — catches default-changing PRs (i18n,
#     onboarding, activation) that the opt-in label skipped, within 24h, without
#     adding ~75 min of ARM latency to every PR. (#1212: the i18n/activation flip
#     broke the suite for ~10 PRs because nobody labeled them e2e.)
# Keeps normal CI fast; this is the full Electron UI suite (merged from the
# former e2e + ui-e2e workflows, which ran the identical suite).
on:
  repository_dispatch:
    types: [host-e2e]
  schedule:
    # 02:00 KST (17:00 UTC) daily — off-peak; runs against the default branch.
    - cron: '0 17 * * *'

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    if: github.repository == 'lvis-project/lvis-app'
    runs-on: ubuntu-24.04-arm
    # github-hosted ARM64 (4 vCPU, single worker) is slower than the old
    # self-hosted Oracle box, and the full Electron suite is heavy — give it
    # generous headroom since this never blocks the per-PR gate.
    timeout-minutes: 75
    env:
      E2E: "1"
      LVIS_E2E: "1"
      HOST_SHA: ${{ github.event.client_payload.host_ref || github.sha }}
    steps:
      - name: Checkout lvis-app
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: lvis-app
          ref: ${{ env.HOST_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact Host main ancestor
        run: |
          set -euo pipefail
          if [[ ! "$HOST_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::host_ref must be an exact 40-character lowercase commit SHA"
            exit 1
          fi
          actual="$(git -C lvis-app rev-parse HEAD)"
          if [ "$actual" != "$HOST_SHA" ]; then
            echo "::error::Host checkout $actual does not match $HOST_SHA"
            exit 1
          fi
          git -C lvis-app fetch origin main --quiet
          git -C lvis-app merge-base --is-ancestor "$HOST_SHA" origin/main

      - name: Checkout local-indexer fixture
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lvis-project/lvis-plugin-local-indexer
          path: lvis-plugin-local-indexer
          token: ${{ secrets.LVIS_REPO_READ_TOKEN }}
          persist-credentials: false

      - name: Checkout meeting fixture
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lvis-project/lvis-plugin-meeting
          path: lvis-plugin-meeting
          token: ${{ secrets.LVIS_REPO_READ_TOKEN }}
          persist-credentials: false

      - name: Checkout work-assistant fixture
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lvis-project/lvis-plugin-work-assistant
          path: lvis-plugin-work-assistant
          token: ${{ secrets.LVIS_REPO_READ_TOKEN }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install xvfb + Electron runtime deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 libnss3 libasound2t64 libxss1 libxshmfence1 \
            libgbm1 libdrm2 libxcomposite1 libxrandr2 libatk1.0-0 \
            libatk-bridge2.0-0 libcups2 libpangocairo-1.0-0 \
            libpango-1.0-0 libcairo2

      # OS deps first, language toolchain second — keeps a corp-proxy
      # apt outage from wasting the bun install before it fails the job.
      - uses: oven-sh/setup-bun@v2

      - name: Install lvis-app deps
        working-directory: lvis-app
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: lvis-app
        # Hard-fail on download errors: a silent install miss surfaces
        # downstream as a confusing "browser executable not found" during
        # `playwright test`, hiding the actual cause (registry hiccup,
        # corp proxy block).
        run: bunx playwright install chromium

      - name: Build app
        working-directory: lvis-app
        run: bun run build

      - name: Run Playwright E2E (Linux)
        working-directory: lvis-app
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" bunx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: lvis-app/playwright-report
          if-no-files-found: ignore
