name: Playwright E2E (on-demand)
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to test (default: main)'
        required: false
        default: main
jobs:
  e2e:
    name: Playwright E2E (Electron)
    runs-on: [self-hosted, Linux, ARM64, oracle]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          path: lvis-app
          submodules: recursive
      - name: Clone sibling plugin repos
        run: |
          set -euo pipefail
          GH_TOKEN=$(gh auth token)
          for slug in lvis-plugin-meeting lvis-plugin-pageindex lvis-plugin-lge-api lvis-plugin-work-proactive lvis-plugin-agent-hub lvis-plugin-ms-graph; do
            if [ -d "$slug" ]; then rm -rf "$slug"; fi
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/lvis-project/${slug}.git" "$slug"
          done
      - uses: oven-sh/setup-bun@v2
      - name: Build plugin-sdk submodule
        run: |
          cd lvis-app/packages/plugin-sdk
          bun install --frozen-lockfile
          bun run build
      - name: Install plugin dependencies
        run: |
          bun install --frozen-lockfile --cwd ../lvis-plugin-pageindex
          bun install --frozen-lockfile --cwd ../lvis-plugin-meeting
          bun install --frozen-lockfile --cwd ../lvis-plugin-lge-api
          bun install --frozen-lockfile --cwd ../lvis-plugin-work-proactive
          bun install --frozen-lockfile --cwd ../lvis-plugin-agent-hub
          bun install --frozen-lockfile --cwd ../lvis-plugin-ms-graph
        working-directory: lvis-app
      - name: Build all plugins
        run: bun run prepare:plugins
        working-directory: lvis-app
      - name: Install app dependencies
        run: bun install --frozen-lockfile
        working-directory: lvis-app
      - name: Build app
        run: bun run build
        working-directory: lvis-app
      - name: Install Playwright system deps for Electron
        run: bunx playwright install --with-deps chromium
        working-directory: lvis-app
      - name: Run Playwright E2E tests
        run: xvfb-run --auto-servernum bunx playwright test
        working-directory: lvis-app
        env:
          CI: "true"
      - name: Upload Playwright report and traces
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            lvis-app/playwright-report/
            lvis-app/test-results/
          retention-days: 7
