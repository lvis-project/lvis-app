name: Check Tool Namespace

on:
  pull_request:
    paths:
      - "plugins/installed/**/plugin.json"
      - "scripts/check-tool-namespace.mjs"
  push:
    branches:
      - main
    paths:
      - "plugins/installed/**/plugin.json"
      - "scripts/check-tool-namespace.mjs"
  workflow_dispatch: {}

jobs:
  check-tool-namespace:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check tool namespace collisions
        run: node scripts/check-tool-namespace.mjs
